name: Update Golf Ranking

on:
  schedule:
    - cron: '0 13 * * *'  # 매일 오후 10시 (KST) 실행
  workflow_dispatch:      # 수동 실행 버튼 활성화

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 pandas

      - name: Run ranking script
        env:
          SG_ID: ${{ secrets.SG_ID }}
          SG_PW: ${{ secrets.SG_PW }}
        run: |
          python update_ranking.py
          python generate_html.py

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -B gh-pages
          git add index.html data.json
          git commit -m "Update ranking $(date '+%Y-%m-%d %H:%M')" || exit 0
          git push origin gh-pages --force
