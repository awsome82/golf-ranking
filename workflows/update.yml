name: Golf Best Score – 주간/월간 랭킹 업데이트

on:
  # ── 자동 실행 ─────────────────────────────────────────────
  schedule:
    # 매일 오전 7시 KST (UTC 22:00 전날) — 평일/주말 모두
    - cron: "0 13 * * *"

  # ── 수동 실행 ─────────────────────────────────────────────
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-ranking:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 소스 체크아웃 ─────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 설정 ───────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. 의존성 설치 ───────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. 스코어 수집 → data.json ───────────────────────
      - name: Collect scores
        env:
          SG_ID: ${{ secrets.SG_ID }}
          SG_PW: ${{ secrets.SG_PW }}
        run: python golf_ranking.py

      # ── 5. HTML 생성 → index.html ─────────────────────────
      - name: Generate HTML
        run: python generate_html.py

      # ── 6. 변경 사항 커밋 & 푸시 ─────────────────────────
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --cached --quiet || git commit -m "♻️ 랭킹 자동 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push
