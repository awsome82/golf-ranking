name: Update Golf Ranking

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-update]

env:
  # Node.js 24 환경 강제 옵트인 (경고 제거용)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 최신 v5 버전 사용 (Node 24 지원)
      - uses: actions/checkout@v5

      # 최신 v6 버전 사용 (Node 24 지원)
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # pandas를 반드시 포함해야 합니다!
      - name: Install dependencies
        run: |
          pip install requests urllib3 pandas

      - name: Run ranking script
        env:
          SG_ID: ${{ secrets.SG_ID }}
          SG_PW: ${{ secrets.SG_PW }}
        # 실행할 파일명이 저장소 내 실제 파일명과 같은지 확인하세요!
        run: python update_ranking.py 

      - name: Generate HTML
        run: python generate_html.py

      - name: Deploy to gh-pages
        run: |
          mkdir -p /tmp/deploy
          cp index.html data.json /tmp/deploy/
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin
          # 브랜치 처리 로직 안정화
          git checkout -B gh-pages
          git rm -rf .
          cp /tmp/deploy/* .
          git add .
          git commit -m "Update ranking $(date '+%Y-%m-%d %H:%M') [skip ci]" || echo "No changes to commit"
          git push origin gh-pages --force
