name: Update Golf Ranking

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-update]

# 전체 워크플로우에 Node.js 24 사용 강제 설정 (선택 사항)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # 최신 Runner 환경 사용 (Node 24를 원활하게 지원하는 ubuntu-24.04 권장)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Node.js 24를 지원하는 최신 버전으로 업데이트 (v4 -> v5)
      - uses: actions/checkout@v5

      # Node.js 24를 지원하는 최신 버전으로 업데이트 (v5 -> v6)
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests urllib3

      - name: Run ranking script
        env:
          SG_ID: ${{ secrets.SG_ID }}
          SG_PW: ${{ secrets.SG_PW }}
        run: python update_ranking.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Check generated files
        run: |
          test -f index.html && echo "✅ index.html 존재" || echo "❌ index.html 없음"
          test -f data.json && echo "✅ data.json 존재" || echo "❌ data.json 없음"

      - name: Deploy to gh-pages
        run: |
          mkdir -p /tmp/deploy
          cp index.html data.json /tmp/deploy/

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin
          # 기존 gh-pages 브랜치가 있다면 초기화 후 재배포
          git checkout --orphan gh-pages-new || git checkout -b gh-pages-new
          git rm -rf .

          cp /tmp/deploy/* .

          git add index.html data.json
          git commit -m "Update ranking $(date '+%Y-%m-%d %H:%M') [skip ci]"
          git push origin gh-pages-new:gh-pages --force

          echo "✅ Node.js 24 환경에서 배포 완료"
