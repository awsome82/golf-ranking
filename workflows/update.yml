name: Update Golf Ranking

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-update]

# 1. 모든 액션이 Node.js 24에서 실행되도록 강제 설정
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Node.js 24 환경을 안정적으로 지원하는 최신 런너 사용
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 2. actions/checkout@v4 를 v5로 업데이트 (Node 24 지원)
      - name: Checkout repository
        uses: actions/checkout@v5

      # 3. actions/setup-python@v5 를 v6로 업데이트 (Node 24 지원)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests urllib3 pandas

      - name: Run ranking script
        env:
          SG_ID: ${{ secrets.SG_ID }}
          SG_PW: ${{ secrets.SG_PW }}
        run: python update_ranking.py

      - name: Generate HTML
        run: python generate_html.py

      - name: Deploy to gh-pages
        run: |
          mkdir -p /tmp/deploy
          cp index.html data.json /tmp/deploy/

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin
          git checkout --orphan gh-pages-new || git checkout -b gh-pages-new
          git rm -rf .

          cp /tmp/deploy/* .

          git add index.html data.json
          git commit -m "Update ranking (Node 24 Optimized) $(date '+%Y-%m-%d %H:%M') [skip ci]"
          git push origin gh-pages-new:gh-pages --force
